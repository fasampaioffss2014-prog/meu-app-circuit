<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Circuito Alimentador</title>


<!-- Biblioteca OCR -->

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
font-family:Arial,sans-serif;
background:#121212;
color:#e0e0e0;
padding:15px;
max-width:650px;
margin:auto;
}


.container{

background:#1e1e1e;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px #000;

}


h2{

text-align:center;
color:#a855f7;

}


#status{

text-align:center;
color:#a855f7;
font-size:14px;
min-height:25px;

}


.bloco-endereco{

border-bottom:1px solid #333;
padding:15px 0;

}


.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}


label{

color:#a855f7;
font-size:12px;
font-weight:bold;

}


input{

width:100%;
box-sizing:border-box;
margin-top:5px;
padding:10px;
border-radius:6px;
border:1px solid #444;
background:#29292e;
color:white;

}


.resultado{

margin-top:12px;
padding:12px;
background:#151515;
border:1px dashed #a855f7;
border-radius:6px;

}


.endereco{

display:block;
color:white;

}


.btn{

width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:7px;
font-size:16px;
font-weight:bold;

}


.adicionar{

background:#202024;
color:#a855f7;
border:1px solid #a855f7;

}


.exportar{

background:#e1e1e6;
color:#121212;

}


.excluir{

background:#7f1d1d;
color:white;

}

</style>


</head>


<body>


<div class="container">


<h2>
Circuito Alimentador
</h2>


<div id="status">

Digite ou fotografe a etiqueta

</div>



<button class="btn adicionar" id="lerEtiqueta">

📷 Ler etiqueta

</button>


<input

type="file"

id="fotoEtiqueta"

accept="image/*"

capture="environment"

style="display:none;">



<div id="lista"></div>



<button class="btn adicionar" id="adicionar">

+ Adicionar Linha

</button>



<button class="btn exportar" id="exportar">

Baixar CSV Circuit

</button>


</div>



<script>


const lista =

document.getElementById("lista");


const btnAdicionar =

document.getElementById("adicionar");


const btnExportar =

document.getElementById("exportar");


const status =

document.getElementById("status");


const btnLerEtiqueta =

document.getElementById("lerEtiqueta");


const fotoEtiqueta =

document.getElementById("fotoEtiqueta");
    // Criar linha de entrega

function criarLinha(){


const bloco =

document.createElement("div");


bloco.className =

"bloco-endereco";



bloco.innerHTML = `


<div class="grid">


<div>

<label>Sequencia</label>

<input 
class="sequencia"
readonly>

</div>


<div>

<label>CEP</label>

<input
class="cep"
maxlength="9"
placeholder="00000-000">

</div>


<div>

<label>Numero</label>

<input
class="numero"
placeholder="Numero">

</div>


<div>

<label>Complemento</label>

<input
class="complemento"
placeholder="Casa bloco apto">

</div>


</div>


<div class="resultado">

Endereco Circuit:

<strong class="endereco">

Aguardando CEP

</strong>

</div>


<button class="btn excluir">

Remover linha

</button>


`;



lista.appendChild(bloco);



const ordem =

document.querySelectorAll(".bloco-endereco").length;



bloco.querySelector(".sequencia").value =

String(ordem).padStart(3,"0");



const cep =

bloco.querySelector(".cep");


const numero =

bloco.querySelector(".numero");


const complemento =

bloco.querySelector(".complemento");


const excluir =

bloco.querySelector(".excluir");



cep.addEventListener("input",()=>{


let valor =

cep.value.replace(/\D/g,"");


if(valor.length>8){

valor = valor.substring(0,8);

}


if(valor.length>5){

cep.value =

valor.substring(0,5)+"-"+valor.substring(5);

}else{

cep.value = valor;

}


if(valor.length===8){

buscarCEP(valor,bloco);

}


});



numero.addEventListener("input",()=>{

montarEndereco(bloco);

});


complemento.addEventListener("input",()=>{

montarEndereco(bloco);

});



excluir.addEventListener("click",()=>{

bloco.remove();

renumerarSequencia();

});

}


function renumerarSequencia(){


document.querySelectorAll(".bloco-endereco")

.forEach((bloco,index)=>{


bloco.querySelector(".sequencia").value =

String(index+1).padStart(3,"0");


});


}



// Leitor de etiqueta

btnLerEtiqueta.addEventListener(

"click",

()=>{


fotoEtiqueta.click();


});



fotoEtiqueta.addEventListener(

"change",

()=>{


const arquivo =

fotoEtiqueta.files[0];



if(!arquivo){

return;

}



status.innerHTML =

"Lendo etiqueta... aguarde";



Tesseract.recognize(

arquivo,

"por",

{

logger:m=>{


if(m.status==="recognizing text"){


status.innerHTML =

"Processando "+

Math.round(m.progress*100)

+

"%";


}


}

}

)

.then(({data:{text}})=>{


status.innerHTML =

"Texto capturado";


processarEtiqueta(text);


})

.catch(()=>{


status.innerHTML =

"Erro ao ler imagem";


});


});



// Processar texto da etiqueta

function processarEtiqueta(texto){



const cepEncontrado =

texto.match(/\d{5}-?\d{3}/);



if(cepEncontrado){


const cep =

cepEncontrado[0].replace(/\D/g,"");



const bloco =

document.querySelector(".bloco-endereco:last-child");



bloco.querySelector(".cep").value =

cep.substring(0,5)+"-"+cep.substring(5);



buscarCEP(cep,bloco);


}else{


status.innerHTML =

"CEP nao encontrado na etiqueta";


}


}// Buscar CEP

function buscarCEP(cep,bloco){


status.innerHTML =

"Buscando endereco...";



fetch(

`https://viacep.com.br/ws/${cep}/json/`

)


.then(res=>res.json())


.then(dados=>{


if(dados.erro){

status.innerHTML =

"CEP nao encontrado";

return;

}



bloco.dataset.rua =

dados.logradouro || "";



bloco.dataset.bairro =

dados.bairro || "";



bloco.dataset.cidade =

dados.localidade || "";



bloco.dataset.uf =

dados.uf || "";



montarEndereco(bloco);



status.innerHTML =

"Endereco encontrado";


});



}




function montarEndereco(bloco){


const rua =

bloco.dataset.rua || "";


const bairro =

bloco.dataset.bairro || "";


const cidade =

bloco.dataset.cidade || "";


const uf =

bloco.dataset.uf || "";



const numero =

bloco.querySelector(".numero")
.value.trim();



const complemento =

bloco.querySelector(".complemento")
.value.trim();



let texto = rua;



if(numero){

texto += ", " + numero;

}


if(complemento){

texto += ", " + complemento;

}


if(bairro){

texto += " - " + bairro;

}


if(cidade){

texto += ", " + cidade;

}


if(uf){

texto += " - " + uf;

}



bloco.querySelector(".endereco").innerText =

texto || "Aguardando CEP";


}




// Remover acentos

function removerAcentos(texto){

return texto

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"");

}




// Adicionar linha

btnAdicionar.addEventListener(

"click",

()=>{

criarLinha();

}

);




// Exportar CSV Circuit

btnExportar.addEventListener(

"click",

()=>{


let csv =

"Sequencia;Destination Address;Bairro;City;Zipcode Postal code\n";



document.querySelectorAll(".bloco-endereco")

.forEach(bloco=>{


const sequencia =

bloco.querySelector(".sequencia").value;


const endereco =

bloco.querySelector(".endereco").innerText;


const bairro =

bloco.dataset.bairro || "";


const cidade =

bloco.dataset.cidade || "";


const cep =

bloco.querySelector(".cep").value;



if(endereco &&

!endereco.includes("Aguardando")){


csv +=

removerAcentos(sequencia)

+

";"

+

removerAcentos(endereco)

+

";"

+

removerAcentos(bairro)

+

";"

+

removerAcentos(cidade)

+

";"

+

removerAcentos(cep)

+

"\n";


}



});



const blob =

new Blob(

[csv],

{

type:

"text/csv;charset=utf-8;"

}

);



const link =

document.createElement("a");



link.href =

URL.createObjectURL(blob);



link.download =

"rotas_circuit.csv";



link.click();



});




// iniciar aplicativo

criarLinha();


</script>


</body>

</html>
