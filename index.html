<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Alimentador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 15px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: #a855f7; margin-top: 0; }
        #status { color: #a855f7; font-style: italic; margin: 10px 0; font-size: 14px; min-height: 20px; }
        
        /* Ajuste do grid para exibir os 3 campos na mesma linha de forma limpa no celular */
        .linha-rota { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 6px; margin-bottom: 8px; text-align: left; }
        .label-grupo { display: flex; flex-direction: column; font-size: 11px; color: #a855f7; font-weight: bold; }
        
        input { background-color: #29292e; border: 1px solid #444; color: #ffffff; padding: 10px 6px; border-radius: 6px; font-size: 13px; margin-top: 4px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #a855f7; }
        
        .resultado-container { background-color: #151515; border: 1px dashed #a855f7; padding: 10px; border-radius: 6px; text-align: left; margin-bottom: 20px; font-size: 13px; color: #888; }
        .resultado-container strong { color: #ffffff; display: block; margin-top: 2px; font-size: 14px; min-height: 20px; }
        
        .btn { background-color: #a855f7; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-add { background-color: #202024; color: #a855f7; border: 1px solid #a855f7; font-size: 14px; padding: 10px; }
        .btn-export { background-color: #e1e1e6; color: #121212; margin-top: 15px; }
        
        #lista-linhas { margin-top: 15px; }
        .bloco-endereco { border-bottom: 1px solid #29292e; padding-bottom: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Circuito Alimentador 📋</h2>
        <div id="status">Insira os dados. Avance usando a tecla Enter ou Próximo.</div>

        <div id="lista-linhas">
            <!-- As linhas de endereço entram aqui dinamicamente -->
        </div>

        <button id="btn-adicionar" class="btn btn-add">+ Adicionar Nova Linha</button>
        <button id="btn-exportar" class="btn btn-export">Baixar CSV para o Circuit</button>
    </div>

    <script>
        const listaLinhas = document.getElementById('lista-linhas');
        const btnAdicionar = document.getElementById('btn-adicionar');
        const btnExportar = document.getElementById('btn-exportar');

        function criarNovaLinha() {
            const bloco = document.createElement('div');
            bloco.className = 'bloco-endereco';
            
            bloco.innerHTML = `
                <div class="linha-rota">
                    <div class="label-grupo">
                        Pacote / Nome
                        <input type="text" class="campo-pacote" placeholder="Ex: 10">
                    </div>
                    <div class="label-grupo">
                        CEP
                        <input type="tel" inputmode="numeric" class="campo-cep" placeholder="00000-000" maxlength="9">
                    </div>
                    <div class="label-grupo">
                        Complemento
                        <input type="text" class="campo-complemento" placeholder="Ex: 54">
                    </div>
                </div>
                <div class="resultado-container">
                    Endereço Completo (Circuit):
                    <strong class="campo-endereco-completo">Aguardando CEP válido...</strong>
                </div>
            `;

            listaLinhas.appendChild(bloco);

            const inputPacote = bloco.querySelector('.campo-pacote');
            const inputCep = bloco.querySelector('.campo-cep');
            const inputComplemento = bloco.querySelector('.campo-complemento');

            inputPacote.focus();

            // Formata o CEP dinamicamente e valida os 8 dígitos limpos
            inputCep.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 8) v = v.slice(0, 8);
                
                if (v.length > 5) {
                    e.target.value = `${v.slice(0, 5)}-${v.slice(5)}`;
                } else {
                    e.target.value = v;
                }

                if (v.length === 8) {
                    buscarEnderecoViaCEP(v, bloco);
                }
            });

            // Sincroniza em tempo real se o digitador mudar ou colocar o número da casa
            inputComplemento.addEventListener('input', () => {
                if (bloco.getAttribute('data-rua-base')) {
                    montarEnderecoFinal(bloco);
                }
            });

            // Mapeamento idêntico ao TAB do computador para o celular
            bloco.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.target === inputPacote) {
                        inputCep.focus();
                    } else if (e.target === inputCep) {
                        inputComplemento.focus();
                    } else if (e.target === inputComplemento) {
                        criarNovaLinha();
                    }
                }
            });
        }

        // CORREÇÃO: Utilizando endpoint HTTPS estável do ViaCEP para carregar no mobile sem bloqueios
        function buscarEnderecoViaCEP(cep, bloco) {
            const status = document.getElementById('status');
            const campoTextoCompleto = bloco.querySelector('.campo-endereco-completo');
            status.innerText = "Buscando localização da rua...";

            fetch(`https://viacep.com.br{cep}/json/`)
            .then(res => res.json())
            .then(dados => {
                if (dados && !dados.erro) {
                    bloco.setAttribute('data-rua-base', dados.logradouro || '');
                    bloco.setAttribute('data-bairro', dados.bairro || '');
                    bloco.setAttribute('data-cidade', dados.localidade || '');
                    bloco.setAttribute('data-estado', dados.uf || '');

                    montarEnderecoFinal(bloco);
                    status.innerText = "Endereço localizado com sucesso!";
                } else {
                    status.innerText = "CEP não encontrado.";
                    campoTextoCompleto.innerText = "CEP não localizado.";
                    bloco.removeAttribute('data-rua-base');
                }
            })
            .catch(() => {
                status.innerText = "Erro de conexão ao buscar mapas.";
                campoTextoCompleto.innerText = "Erro ao localizar.";
            });
        }

        // Monta o endereço final concatenando rua, número do complemento, bairro, cidade e estado
        function montarEnderecoFinal(bloco) {
            const campoTextoCompleto = bloco.querySelector('.campo-endereco-completo');
            const complemento = bloco.querySelector('.campo-complemento').value.trim();
            
            const rua = bloco.getAttribute('data-rua-base');
            const bairro = bloco.getAttribute('data-bairro');
            const city = bloco.getAttribute('data-cidade');
            const uf = bloco.getAttribute('data-estado');

            let formatado = rua;
            if (complemento) {
                formatado += `, ${complemento}`;
            }
            if (bairro) formatado += ` - ${bairro}`;
            if (city) formatado += `, ${city}`;
            if (uf) formatado += ` - ${uf}`;
            
            campoTextoCompleto.innerText = formatado;
        }

        // Inicializa o app criando o primeiro bloco
        criarNovaLinha();

        btnAdicionar.addEventListener('click', criarNovaLinha);

        // Exportação limpa com tratamento de acentos para o Excel e Circuit
        btnExportar.addEventListener('click', () => {
            const blocos = document.querySelectorAll('.bloco-endereco');
            let conteudoCsv = "Name;Address\n";

            blocos.forEach(bloco => {
                const pacote = bloco.querySelector('.campo-pacote').value.trim();
                const endereco = bloco.querySelector('.campo-endereco-completo').innerText.trim();

                if (pacote || (endereco && !endereco.includes("Aguardando"))) {
                    const pacoteLimpo = pacote.replace(/;/g, ' ');
                    const enderecoLimpo = endereco.replace(/;/g, ' ');
                    conteudoCsv += `${pacoteLimpo};${enderecoLimpo}\n`;
                }
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), conteudoCsv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "rotas_circuit.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
