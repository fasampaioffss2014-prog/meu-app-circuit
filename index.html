<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Alimentador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 15px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: #a855f7; margin-top: 0; }
        #status { color: #a855f7; font-style: italic; margin: 10px 0; font-size: 14px; }
        .btn { background-color: #a855f7; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-export { background-color: #e1e1e6; color: #121212; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1e1e1e; }
        th, td { border: 1px solid #29292e; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #202024; color: #a855f7; }
        td[contenteditable="true"] { background-color: #29292e; border: 1px solid #a855f7; color: #ffffff; min-width: 50px; }
        .bloqueado { background-color: #151515; color: #888; cursor: not-allowed; }
        .map-container { margin-top: 25px; border-radius: 8px; overflow: hidden; border: 2px solid #29292e; background-color: #202024; display: none; }
        iframe { width: 100%; height: 350px; border: 0; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Circuito Alimentador 📋</h2>
        <div id="status">Digite o CEP para buscar a rua, depois insira o complemento!</div>

        <table id="tabela-rotas">
            <thead>
                <tr>
                    <th>Pacote</th>
                    <th>CEP</th>
                    <th>Complemento (Nº/Ap)</th>
                    <th>Endereço Completo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td contenteditable="true" autofocus></td>
                    <td contenteditable="true" class="campo-cep"></td>
                    <td contenteditable="true" class="campo-complemento"></td>
                    <td class="campo-endereco-completo bloqueado" data-rua=""></td>
                </tr>
            </tbody>
        </table>

        <button id="btn-exportar" class="btn btn-export">Baixar CSV para o Circuit</button>

        <!-- Área do Mapa Multi-Pontos -->
        <div class="map-container" id="container-mapa">
            <iframe id="mapa-google" src=""></iframe>
        </div>
    </div>

    <script>
        const tabelaCorpo = document.querySelector('#tabela-rotas tbody');
        const btnExportar = document.getElementById('btn-exportar');
        const containerMapa = document.getElementById('container-mapa');
        const mapaGoogle = document.getElementById('mapa-google');

        // Atualiza o mapa combinando todos os endereços válidos da tabela
        function atualizarMapaGeral() {
            const linhas = tabelaCorpo.querySelectorAll('tr');
            let listaEnderecos = [];

            linhas.forEach(linha => {
                const celulaEndereco = linha.querySelector('.campo-endereco-completo');
                const enderecoTexto = celulaEndereco ? celulaEndereco.innerText.trim() : '';
                
                if (enderecoTexto) {
                    listaEnderecos.push(encodeURIComponent(enderecoTexto));
                }
            });

            if (listaEnderecos.length > 0) {
                // Se houver apenas 1 ponto, mostra o marcador simples
                if (listaEnderecos.length === 1) {
                    mapaGoogle.src = `https://google.com{listaEnderecos[0]}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
                } else {
                    // Se houver mais de 1 ponto, monta o fluxo de rota (Origem -> Destino -> Waypoints)
                    const origem = listaEnderecos[0];
                    const destino = listaEnderecos[listaEnderecos.length - 1];
                    const intermediarios = listaEnderecos.slice(1, -1).join('|');

                    let urlMapa = `https://google.com{origem}&daddr=${destino}`;
                    if (intermediarios) {
                        urlMapa += `+to:${intermediarios}`;
                    }
                    urlMapa += `&t=&z=13&ie=UTF8&iwloc=&output=embed`;
                    
                    mapaGoogle.src = urlMapa;
                }
                containerMapa.style.display = 'block';
            }
        }

        // Busca o CEP e salva a rua base na tabela
        function buscarCep(cep, linha) {
            const cepLimpo = cep.trim().replace('-', '').replace(/\s/g, '');
            const celulaEndereco = linha.querySelector('.campo-endereco-completo');
            const complemento = linha.querySelector('.campo-complemento').innerText.trim();
            
            if (cepLimpo.length === 8 && /^\d+$/.test(cepLimpo)) {
                statusDivText("Buscando CEP...");
                
                fetch(`https://viacep.com.br{cepLimpo}/json/`)
                .then(res => res.json())
                .then(dados => {
                    if(!dados.erro) {
                        const ruaBase = `${dados.logradouro}, ${dados.bairro} - ${dados.localidade}`;
                        celulaEndereco.setAttribute('data-rua', ruaBase);
                        
                        celulaEndereco.innerText = complemento ? `${ruaBase} (Nº ${complemento})` : ruaBase;
                        statusDivText("Endereço adicionado ao circuito!");
                        
                        // Atualiza os múltiplos marcadores no mapa
                        atualizarMapaGeral();
                    } else {
                        statusDivText("CEP não encontrado.");
                    }
                })
                .catch(() => {
                    statusDivText("Erro de conexão com o ViaCEP.");
                });
            }
        }

        function statusDivText(txt) {
            document.getElementById('status').innerText = txt;
        }

        // Escuta as alterações na tabela (CEP ou Complemento)
        tabelaCorpo.addEventListener('input', (e) => {
            const linhaAtual = e.target.parentElement;
            
            if (e.target.classList.contains('campo-cep')) {
                buscarCep(e.target.innerText, linhaAtual);
            }
            
            if (e.target.classList.contains('campo-complemento')) {
                const celulaEndereco = linhaAtual.querySelector('.campo-endereco-completo');
                const ruaBase = celulaEndereco.getAttribute('data-rua');
                const complemento = e.target.innerText.trim();
                
                if (ruaBase) {
                    celulaEndereco.innerText = complemento ? `${ruaBase} (Nº ${complemento})` : ruaBase;
                    atualizarMapaGeral();
                }
            }
        });

        // Cria nova linha dinamicamente ao dar Enter no último campo
        function adicionarNovaLinha() {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true"></td>
                <td contenteditable="true" class="campo-cep"></td>
                <td contenteditable="true" class="campo-complemento"></td>
                <td class="campo-endereco-completo bloqueado" data-rua=""></td>
            `;
            tabelaCorpo.appendChild(tr);
            return tr;
        }

        // Controla o fluxo de teclas (Enter para mudar de caixa)
        tabelaCorpo.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                
                const celulaAtual = e.target;
                const linhaAtual = celulaAtual.parentElement;
                
                const celulasEditaveis = Array.from(linhaAtual.querySelectorAll('td[contenteditable="true"]'));
                const indexAtual = celulasEditaveis.indexOf(celulaAtual);

                if (indexAtual !== -1 && indexAtual < celulasEditaveis.length - 1) {
                    celulasEditaveis[indexAtual + 1].focus();
                } else if (celulaAtual.classList.contains('campo-complemento')) {
                    let proximaLinha = linhaAtual.nextElementSibling;
                    
                    if (!proximaLinha) {
                        proximaLinha = adicionarNovaLinha();
                    }
                    
                    const primeiroInputProximaLinha = proximaLinha.querySelector('td[contenteditable="true"]');
                    if (primeiroInputProximaLinha) {
                        primeiroInputProximaLinha.focus();
                    }
                }
            }
        });

        // Gera o CSV combinando o endereço final gerado
        btnExportar.addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,Name,Address,Postal Code\n";
            const linhasTabela = tabelaCorpo.querySelectorAll('tr');
            let temDados = false;
            
            linhasTabela.forEach(linha => {
                const colunas = linha.querySelectorAll('td');
                if(colunas.length === 4) {
                    const name = colunas[0].innerText.trim();
                    const postalCode = colunas[1].innerText.trim().replace('-', '');
                    const address = colunas[3].innerText.trim().replace(/"/g, '""');
                    
                    if (name || address || postalCode) {
                        csvContent += `"${name}","${address}","${postalCode}"\n`;
                        temDados = true;
