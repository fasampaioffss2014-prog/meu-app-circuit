<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Alimentador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; max-width: 500px; margin: 0 auto; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: #a855f7; margin-top: 0; }
        #status { color: #a855f7; font-style: italic; margin: 10px 0; font-size: 14px; }
        .btn { background-color: #a855f7; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-add { background-color: #241935; color: #a855f7; border: 1px dashed #a855f7; margin-top: 15px; }
        .btn-export { background-color: #e1e1e6; color: #121212; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1e1e1e; }
        th, td { border: 1px solid #29292e; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #202024; color: #a855f7; }
        td[contenteditable="true"] { background-color: #29292e; border: 1px solid #a855f7; color: #ffffff; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Circuito Alimentador 📋</h2>
        <div id="status">Use o Google Lens para copiar o endereço e cole nas caixas abaixo:</div>

        <table id="tabela-rotas">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Postal Code</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>4</td>
                    <td contenteditable="true" placeholder="Cole o endereço aqui"></td>
                    <td contenteditable="true" placeholder="CEP"></td>
                </tr>
            </tbody>
        </table>

        <button id="btn-adicionar" class="btn btn-add">+ Adicionar Nova Linha</button>
        <button id="btn-exportar" class="btn btn-export">Baixar CSV para o Circuit</button>
    </div>

    <script>
        const tabelaCorpo = document.querySelector('#tabela-rotas tbody');
        const btnAdicionar = document.getElementById('btn-adicionar');
        const btnExportar = document.getElementById('btn-exportar');
        let proximoId = 5;

        btnAdicionar.addEventListener('click', () => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${proximoId++}</td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
            `;
            tabelaCorpo.appendChild(tr);
        });

        btnExportar.addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,Name,Address,Postal Code\n";
            const linhasTabela = tabelaCorpo.querySelectorAll('tr');
            
            linhasTabela.forEach(linha => {
                const colunas = linha.querySelectorAll('td');
                if(colunas.length === 3) {
                    const name = colunas[0].innerText.trim();
                    const address = colunas[1].innerText.trim().replace(/"/g, '""');
                    const postalCode = colunas[2].innerText.trim();
                    
                    if (address || postalCode) {
                        csvContent += `${name},"${address}",${postalCode}\n`;
                    }
                }
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "rotas_circuit.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
