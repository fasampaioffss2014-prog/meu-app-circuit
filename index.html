<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentador Circuit</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #121214; color: #ffffff; }
        .container { max-width: 500px; margin: auto; }
        h2 { text-align: center; color: #a855f7; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #c4c4cc; }
        input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #29292e; background-color: #202024; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add { background-color: #a855f7; color: white; }
        .btn-export { background-color: #e1e1e6; color: #121214; margin-top: 25px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #29292e; padding: 10px; text-align: left; }
        th { background-color: #202024; color: #a855f7; }
        .btn-del { background-color: #f75a68; color: white; padding: 5px 10px; margin: 0; width: auto; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Circuit Data Feeder</h2>
    
    <form id="deliveryForm">
        <label>Nome do Destinatário:</label>
        <input type="text" id="name" placeholder="Ex: Fabio Francisco" required>
        
        <label>Endereço de Entrega:</label>
        <input type="text" id="address" placeholder="Ex: Rua Antônio Coelho, 54" required>
        
        <label>CEP:</label>
        <input type="text" id="cep" placeholder="Ex: 23585080" required>
        
        <button type="submit" class="btn-add">Adicionar à Lista</button>
    </form>

    <button onclick="exportToCSV()" class="btn-export">📥 Exportar para o Circuit (.CSV)</button>

    <table id="deliveriesTable">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Endereço</th>
                <th>CEP</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let deliveries = JSON.parse(localStorage.getItem('deliveries')) || [];

    function renderTable() {
        const tbody = document.querySelector('#deliveriesTable tbody');
        tbody.innerHTML = '';
        deliveries.forEach((item, index) => {
            const row = `<tr>
                <td>${item.name}</td>
                <td>${item.address}</td>
                <td>${item.cep}</td>
                <td><button class="btn-del" onclick="deleteItem(${index})">X</button></td>
            </tr>`;
            tbody.innerHTML += row;
        });
        localStorage.setItem('deliveries', JSON.stringify(deliveries));
    }

    document.getElementById('deliveryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const address = document.getElementById('address').value;
        const cep = document.getElementById('cep').value;

        deliveries.push({ name, address, cep });
        renderTable();
        
        this.reset();
        document.getElementById('name').focus();
    });

    function deleteItem(index) {
        deliveries.splice(index, 1);
        renderTable();
    }

    function exportToCSV() {
        if (deliveries.length === 0) {
            alert('Adicione pelo menos uma entrega antes de exportar!');
            return;
        }
        
        let csvContent = "\uFEFFName,Address,Postal Code\n"; 
        
        deliveries.forEach(item => {
            let cleanName = item.name.replace(/,/g, ' ');
            let cleanAddress = item.address.replace(/,/g, ' ');
            let cleanCep = item.cep.replace(/,/g, ' ');
            
            csvContent += `"${cleanName}","${cleanAddress}","${cleanCep}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "rotas_circuit.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    renderTable();
</script>

</body>
</html>
