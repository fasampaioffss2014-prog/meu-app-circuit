<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Alimentador</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 15px; max-width: 600px; margin: 0 auto; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: #a855f7; margin-top: 0; }
        #status { color: #a855f7; font-style: italic; margin: 10px 0; font-size: 14px; }
        .btn { background-color: #a855f7; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-add { background-color: #202024; color: #a855f7; border: 1px solid #a855f7; margin-top: 10px; padding: 8px; font-size: 14px; }
        .btn-add:hover { background-color: #a855f7; color: white; }
        .btn-export { background-color: #e1e1e6; color: #121212; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1e1e1e; }
        th, td { border: 1px solid #29292e; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #202024; color: #a855f7; }
        td[contenteditable="true"] { background-color: #29292e; border: 1px solid #a855f7; color: #ffffff; min-width: 50px; }
        .bloqueado { background-color: #151515; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Circuito Alimentador 📋</h2>
        <div id="status">Insira os dados. Pressione Enter para navegar.</div>

        <table id="tabela-rotas">
            <thead>
                <tr>
                    <th>Pacote / Nome</th>
                    <th>CEP</th>
                    <th>Complemento</th>
                    <th>Endereço Completo (Circuit)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td contenteditable="true" class="campo-pacote" autofocus></td>
                    <td contenteditable="true" class="campo-cep"></td>
                    <td contenteditable="true" class="campo-complemento"></td>
                    <td class="campo-endereco-completo bloqueado" data-rua=""></td>
                </tr>
            </tbody>
        </table>

        <button id="btn-adicionar" class="btn btn-add">+ Adicionar Nova Linha</button>
        <button id="btn-exportar" class="btn btn-export">Baixar CSV para o Circuit</button>
    </div>

    <script>
        const tabelaCorpo = document.querySelector('#tabela-rotas tbody');
        const btnAdicionar = document.getElementById('btn-adicionar');
        const btnExportar = document.getElementById('btn-exportar');

        // Retorna apenas o texto puro e limpo de elementos editáveis no mobile
        function obterTextoLimpo(elemento) {
            if (!elemento) return '';
            return elemento.innerText.replace(/\n/g, '').replace(/\r/g, '').trim();
        }

        // Fundamento 4: Busca na API e monta o endereço completo de forma automática
        function buscarEAtualizarEndereco(linha) {
            const celulaCep = linha.querySelector('.campo-cep');
            const cepLimpo = obterTextoLimpo(celulaCep).replace(/\D/g, '');
            const celulaEndereco = linha.querySelector('.campo-endereco-completo');
            const complemento = obterTextoLimpo(linha.querySelector('.campo-complemento'));
            
            if (cepLimpo.length === 8) {
                document.getElementById('status').innerText = "Buscando endereço...";
                
                fetch(`https://viacep.com.br{cepLimpo}/json/`)
                .then(res => res.json())
                .then(dados => {
                    if(!dados.erro) {
                        const ruaBase = `${dados.logradouro}, ${dados.bairro} - ${dados.localidade}`;
                        celulaEndereco.setAttribute('data-rua', ruaBase);
                        // Atualiza a quarta coluna automaticamente combinando Rua + Complemento
                        celulaEndereco.innerText = complemento ? `${ruaBase}, Nº ${complemento}` : ruaBase;
                        document.getElementById('status').innerText = "Endereço atualizado!";
                    } else {
                        document.getElementById('status').innerText = "CEP inválido.";
                        celulaEndereco.innerText = "";
                        celulaEndereco.removeAttribute('data-rua');
                    }
                })
                .catch(() => {
                    document.getElementById('status').innerText = "Erro ao conectar com serviço de CEP.";
                });
            }
        }

        // Monitora as alterações nas colunas para atualizar a quarta coluna dinamicamente
        tabelaCorpo.addEventListener('input', (e) => {
            const linhaAtual = e.target.parentElement;
            
            if (e.target.classList.contains('campo-cep')) {
                const cepLimpo = obterTextoLimpo(e.target).replace(/\D/g, '');
                if (cepLimpo.length === 8) {
                    buscarEAtualizarEndereco(linhaAtual);
                }
            }
            
            if (e.target.classList.contains('campo-complemento')) {
                const celulaEndereco = linhaAtual.querySelector('.campo-endereco-completo');
                const ruaBase = celulaEndereco.getAttribute('data-rua');
                const complemento = obterTextoLimpo(e.target);
                
                if (ruaBase) {
                    celulaEndereco.innerText = complemento ? `${ruaBase}, Nº ${complemento}` : ruaBase;
                }
            }
        });

        // Garante a busca caso o usuário mude de coluna no celular tocando na tela
        tabelaCorpo.addEventListener('focusout', (e) => {
            if (e.target.classList.contains('campo-cep') || e.target.classList.contains('campo-complemento')) {
                buscarEAtualizarEndereco(e.target.parentElement);
            }
        });

        // Criação de nova linha limpa
        function adicionarNovaLinha() {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true" class="campo-pacote"></td>
                <td contenteditable="true" class="campo-cep"></td>
                <td contenteditable="true" class="campo-complemento"></td>
                <td class="campo-endereco-completo bloqueado" data-rua=""></td>
            `;
            tabelaCorpo.appendChild(tr);
            return tr;
        }

        // Botão manual de Adicionar Nova Linha funcionando
        btnAdicionar.addEventListener('click', () => {
            const novaLinha = adicionarNovaLinha();
            novaLinha.querySelector('.campo-pacote').focus();
        });

        // Comportamento do Enter funcionando estritamente como a tecla Tab (Próxima Célula)
        tabelaCorpo.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault(); // Impede a quebra de linha visual dentro da caixa
                
                const celulaAtual = e.target;
                const linhaAtual = celulaAtual.parentElement;

                if (celulaAtual.classList.contains('campo-pacote')) {
                    linhaAtual.querySelector('.campo-cep').focus();
                } 
                else if (celulaAtual.classList.contains('campo-cep')) {
                    buscarEAtualizarEndereco(linhaAtual);
                    linhaAtual.querySelector('.campo-complemento').focus();
                } 
                else if (celulaAtual.classList.contains('campo-complemento')) {
                    const novaLinha = adicionarNovaLinha();
                    setTimeout(() => {
                        novaLinha.querySelector('.campo-pacote').focus();
                    }, 50);
                }
            }
        });

        // Botão de Exportar funcionando corrigido (Sem variáveis corrompidas)
        btnExportar.addEventListener('click', () => {
            const linhas = tabelaCorpo.querySelectorAll('tr');
            let conteudoCsv = "Pacote;CEP;Complemento;Endereco Completo\n";

            linhas.forEach(linha => {
                const pacote = obterTextoLimpo(linha.querySelector('.campo-pacote'));
                const cep = obterTextoLimpo(linha.querySelector('.campo-cep'));
                const complemento = obterTextoLimpo(linha.querySelector('.campo-complemento'));
                const endereco = obterTextoLimpo(linha.querySelector('.campo-endereco-completo'));

                if (pacote || cep || endereco) {
                    conteudoCsv += `${pacote};${cep};${complemento};${endereco}\n`;
                }
            });

            const blob = new Blob([conteudoCsv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "circuito_alimentador.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
