<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Circuito Alimentador</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:#e0e0e0;
    padding:15px;
    max-width:650px;
    margin:auto;
}

.container{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px #000;
}

h2{
    text-align:center;
    color:#a855f7;
}

#status{
    text-align:center;
    color:#a855f7;
    font-size:14px;
    min-height:25px;
}

.bloco-endereco{
    border-bottom:1px solid #333;
    padding:15px 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

label{
    color:#a855f7;
    font-size:12px;
    font-weight:bold;
}

input{
    width:100%;
    box-sizing:border-box;
    margin-top:5px;
    padding:10px;
    border-radius:6px;
    border:1px solid #444;
    background:#29292e;
    color:white;
    font-size:14px;
}

input:focus{
    border-color:#a855f7;
    outline:none;
}

.resultado{
    margin-top:12px;
    padding:12px;
    background:#151515;
    border:1px dashed #a855f7;
    border-radius:6px;
    font-size:14px;
}

.endereco{
    display:block;
    color:white;
    margin-top:5px;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:7px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.adicionar{
    background:#202024;
    color:#a855f7;
    border:1px solid #a855f7;
}

.exportar{
    background:#e1e1e6;
    color:#121212;
}

.excluir{
    background:#7f1d1d;
    color:white;
}

.sucesso{
    color:#22c55e;
}

.erro{
    color:#ef4444;
}

</style>

</head>


<body>


<div class="container">


<h2>
Circuito Alimentador 📦
</h2>


<div id="status">
Digite os dados da etiqueta
</div>


<div id="lista"></div>


<button class="btn adicionar" id="adicionar">
+ Adicionar Nova Linha
</button>


<button class="btn exportar" id="exportar">
Baixar CSV para Circuit
</button>


</div>


<script>


const lista =
document.getElementById("lista");


const btnAdicionar =
document.getElementById("adicionar");


const btnExportar =
document.getElementById("exportar");


const status =
document.getElementById("status");



// Criar linha de entrega

function criarLinha(){


const bloco =
document.createElement("div");


bloco.className =
"bloco-endereco";



bloco.innerHTML = `


<div class="grid">


<div>

<label>Sequência</label>

<input 
type="text"
class="sequencia"
readonly>

</div>



<div>

<label>CEP</label>

<input
type="text"
class="cep"
inputmode="numeric"
maxlength="9"
placeholder="00000-000">

</div>



<div>

<label>Número</label>

<input
type="text"
class="numero"
placeholder="Ex: 150">

</div>



<div>

<label>Complemento</label>

<input
type="text"
class="complemento"
placeholder="Casa, bloco, apto">

</div>


</div>



<div class="resultado">

Endereço Circuit:

<strong class="endereco">

Aguardando CEP...

</strong>

</div>



<button class="btn excluir">

Remover linha

</button>


`;


lista.appendChild(bloco);


// sequência automática

const ordem =
document.querySelectorAll(".bloco-endereco").length;


bloco.querySelector(".sequencia").value =
String(ordem).padStart(3,"0");



const cep =
bloco.querySelector(".cep");


const numero =
bloco.querySelector(".numero");


const complemento =
bloco.querySelector(".complemento");


const excluir =
bloco.querySelector(".excluir");


cep.addEventListener("input",()=>{


let valor =
cep.value.replace(/\D/g,"");


if(valor.length>8){

valor =
valor.substring(0,8);

}


if(valor.length>5){

cep.value =
valor.substring(0,5)
+
"-"
+
valor.substring(5);


}else{


cep.value =
valor;


}


if(valor.length===8){

buscarCEP(valor,bloco);

}


});
    numero.addEventListener("input",()=>{

    montarEndereco(bloco);

});


complemento.addEventListener("input",()=>{

    montarEndereco(bloco);

});



// Navegação ENTER

bloco.addEventListener("keydown",(e)=>{


    if(e.key==="Enter"){


        e.preventDefault();


        if(e.target===cep){

            numero.focus();

        }
        else if(e.target===numero){

            complemento.focus();

        }
        else if(e.target===complemento){

            criarLinha();

        }


    }


});



excluir.addEventListener("click",()=>{


    bloco.remove();

    renumerarSequencia();

    salvarDados();


});


}



// Renumerar sequência após excluir

function renumerarSequencia(){


document.querySelectorAll(".bloco-endereco")
.forEach((bloco,index)=>{


bloco.querySelector(".sequencia").value =

String(index+1).padStart(3,"0");


});


}



// Buscar CEP ViaCEP

function buscarCEP(cep,bloco){


status.innerHTML =
"🔎 Buscando endereço...";



fetch(

`https://viacep.com.br/ws/${cep}/json/`

)


.then(res=>res.json())


.then(dados=>{


if(dados.erro){


status.innerHTML =
"<span class='erro'>CEP não encontrado</span>";

return;

}



bloco.dataset.rua =
dados.logradouro || "";



bloco.dataset.bairro =
dados.bairro || "";



bloco.dataset.cidade =
dados.localidade || "";



bloco.dataset.uf =
dados.uf || "";



montarEndereco(bloco);



status.innerHTML =
"<span class='sucesso'>✔ Endereço encontrado</span>";



salvarDados();


})


.catch(()=>{


status.innerHTML =
"<span class='erro'>Erro ao consultar CEP</span>";


});


}



// Montar endereço

function montarEndereco(bloco){



const rua =
bloco.dataset.rua || "";


const bairro =
bloco.dataset.bairro || "";


const cidade =
bloco.dataset.cidade || "";


const uf =
bloco.dataset.uf || "";



const numero =
bloco.querySelector(".numero")
.value.trim();



const complemento =
bloco.querySelector(".complemento")
.value.trim();



let texto = rua;



if(numero){

texto += ", " + numero;

}



if(complemento){

texto += ", " + complemento;

}



if(bairro){

texto += " - " + bairro;

}



if(cidade){

texto += ", " + cidade;

}



if(uf){

texto += " - " + uf;

}



bloco.querySelector(".endereco").innerText =

texto || "Aguardando CEP...";



salvarDados();


}



// Adicionar nova linha

btnAdicionar.addEventListener(

"click",

()=>{


criarLinha();


}

);



// Salvar dados

function salvarDados(){


const dados = [];



document.querySelectorAll(".bloco-endereco")

.forEach(bloco=>{


dados.push({


sequencia:

bloco.querySelector(".sequencia").value,



cep:

bloco.querySelector(".cep").value,



numero:

bloco.querySelector(".numero").value,



complemento:

bloco.querySelector(".complemento").value,



rua:

bloco.dataset.rua || "",



bairro:

bloco.dataset.bairro || "",



cidade:

bloco.dataset.cidade || "",



uf:

bloco.dataset.uf || ""


});


});



localStorage.setItem(

"rotas_circuit",

JSON.stringify(dados)

);


}



// Carregar dados salvos

function carregarDados(){


const dados =

JSON.parse(

localStorage.getItem("rotas_circuit")

);



if(!dados || dados.length===0){

return;

}



lista.innerHTML = "";



dados.forEach(item=>{


criarLinha();



const bloco =

lista.lastElementChild;



bloco.querySelector(".cep").value =

item.cep;



bloco.querySelector(".numero").value =

item.numero;



bloco.querySelector(".complemento").value =

item.complemento;



bloco.dataset.rua =

item.rua;



bloco.dataset.bairro =

item.bairro;



bloco.dataset.cidade =

item.cidade;



bloco.dataset.uf =

item.uf;



montarEndereco(bloco);



});


}
    // Exportar CSV para Circuit

btnExportar.addEventListener(
"click",
()=>{


let csv =

"Sequência;Destination Address;Bairro;City;Zipcode/Postal code\n";



document.querySelectorAll(".bloco-endereco")

.forEach(bloco=>{


const sequencia =

bloco.querySelector(".sequencia")
.value.trim();



const endereco =

bloco.querySelector(".endereco")
.innerText.trim();



const bairro =

bloco.dataset.bairro || "";



const cidade =

bloco.dataset.cidade || "";



const cep =

bloco.querySelector(".cep")
.value.trim();



if(endereco &&

!endereco.includes("Aguardando")){



csv +=

sequencia.replace(/;/g," ")

+

";"

+

endereco.replace(/;/g," ")

+

";"

+

bairro.replace(/;/g," ")

+

";"

+

cidade.replace(/;/g," ")

+

";"

+

cep.replace(/;/g," ")

+

"\n";



}



});



// Corrigir acentos no Excel

const blob =

new Blob(

[

"\ufeff",

csv

],

{

type:

"text/csv;charset=utf-8;"

}

);



const link =

document.createElement("a");



link.href =

URL.createObjectURL(blob);



link.download =

"rotas_circuit.csv";



link.click();



});



// Criar primeira linha

criarLinha();



// Carregar dados salvos ao abrir

carregarDados();


</script>


</body>

</html>
